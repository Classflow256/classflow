<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Class Flow Academic Portal</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="site-shell">
      <section class="auth-screen" id="authScreen">
        <div class="auth-art" aria-hidden="true">
          <img src="assets/classflow-logo.png" alt="" />
          <div class="auth-art-brand">
            <span>Class Flow</span>
          </div>
          <div class="auth-art-copy">
            <h1>Your course, assignments, tests, and exams in one focused space.</h1>
          </div>
        </div>

        <form class="auth-card" id="loginForm">
          <div class="auth-heading">
            <h2>Welcome Back</h2>
          </div>

          <label class="field-label" for="studentEmail">Student Email</label>
          <div class="input-shell">
            <span data-icon="at-sign"></span>
            <input id="studentEmail" name="studentEmail" type="email" placeholder="username@university.edu" autocomplete="email" required />
          </div>

          <div class="field-row">
            <label class="field-label" for="studentPassword">Password</label>
            <button class="link-button" type="button" id="forgotBtn">Forgot Password?</button>
          </div>
          <div class="input-shell">
            <span data-icon="lock"></span>
            <input id="studentPassword" name="studentPassword" type="password" placeholder="Password" autocomplete="current-password" required />
            <button class="icon-button ghost" type="button" id="togglePassword" aria-label="Show password" title="Show password">
              <span data-icon="eye"></span>
            </button>
          </div>

          <label class="check-row">
            <input type="checkbox" />
            <span>Keep me signed in for 30 days</span>
          </label>

          <button class="primary-action" type="submit">
            <span>Sign In</span>
            <span data-icon="log-in"></span>
          </button>

        </form>
      </section>

      <section class="app-screen is-hidden" id="appScreen">
        <header class="topbar">
          <button class="icon-button menu-toggle" type="button" id="menuToggle" aria-label="Open navigation" title="Open navigation">
            <span data-icon="menu"></span>
          </button>
          <a class="brand-mark" href="#" data-route="home" aria-label="Class Flow home">
            <img class="brand-logo" src="assets/classflow-logo.png" alt="" />
            <span>Class Flow</span>
          </a>
          <div class="topbar-actions">
            <button class="icon-button desktop-only" type="button" id="globalSearchBtn" aria-label="Search" title="Search">
              <img class="action-icon-img" src="assets/icon-search.jpg" alt="" />
            </button>
            <button class="icon-button notification-button" type="button" id="notificationsBtn" aria-label="Notifications" title="Notifications">
              <img class="action-icon-img" src="assets/icon-notifications.jpg" alt="" />
              <span class="notification-count is-hidden" id="notificationCount">0</span>
            </button>
            <button class="avatar-button" type="button" id="profileBtn" aria-label="Profile menu" title="Profile menu">A</button>
          </div>
        </header>

        <aside class="side-nav" id="sideNav" aria-label="Primary navigation">
          <button class="nav-item is-active" data-route="home" type="button">
            <img class="nav-icon-img" src="assets/icon-home.jpg" alt="" />
            <span>Home</span>
          </button>
          <button class="nav-item" data-route="tasks" type="button">
            <img class="nav-icon-img" src="assets/icon-tasks.jpg" alt="" />
            <span>Tasks</span>
          </button>
          <button class="nav-item" data-route="calendar" type="button">
            <img class="nav-icon-img" src="assets/icon-calendar.jpg" alt="" />
            <span>Calendar</span>
          </button>
          <button class="nav-item" data-route="timetable" type="button">
            <img class="nav-icon-img" src="assets/icon-calendar.jpg" alt="" />
            <span>Timetable</span>
          </button>
          <button class="nav-item" data-route="reps" type="button">
            <img class="nav-icon-img" src="assets/icon-admin.jpg" alt="" />
            <span>Admin</span>
          </button>
        </aside>

        <main class="view-stage" id="viewStage" tabindex="-1"></main>

        <nav class="bottom-nav" aria-label="Primary navigation">
          <button class="nav-item is-active" data-route="home" type="button">
            <img class="nav-icon-img" src="assets/icon-home.jpg" alt="" />
            <span>Home</span>
          </button>
          <button class="nav-item" data-route="tasks" type="button">
            <img class="nav-icon-img" src="assets/icon-tasks.jpg" alt="" />
            <span>Tasks</span>
          </button>
          <button class="nav-item" data-route="calendar" type="button">
            <img class="nav-icon-img" src="assets/icon-calendar.jpg" alt="" />
            <span>Calendar</span>
          </button>
          <button class="nav-item" data-route="timetable" type="button">
            <img class="nav-icon-img" src="assets/icon-calendar.jpg" alt="" />
            <span>Timetable</span>
          </button>
          <button class="nav-item" data-route="reps" type="button">
            <img class="nav-icon-img" src="assets/icon-admin.jpg" alt="" />
            <span>Admin</span>
          </button>
        </nav>
      </section>
    </div>

    <div class="modal-host is-hidden" id="modalHost" aria-hidden="true">
      <div class="modal-backdrop" data-close-modal></div>
      <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <button class="icon-button modal-close" type="button" data-close-modal aria-label="Close dialog" title="Close">
          <span data-icon="x"></span>
        </button>
        <div id="modalContent"></div>
      </section>
    </div>

    <div class="toast-stack" id="toastStack" aria-live="polite" aria-atomic="true"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
  </body>
</html>
